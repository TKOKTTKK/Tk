<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSMpeg 免疫拦截纯净测试</title>
    <style>
        html, body { background: #111; color: #eee; margin: 0; padding: 15px; font-family: sans-serif; text-align: center; }
        .wrapper { max-width: 500px; margin: 20px auto; background: #000; border-radius: 8px; overflow: hidden; }
        #video-canvas { width: 100%; display: block; background: #222; aspect-ratio: 9 / 16; }
        .btn-box { padding: 20px; }
        .play-btn { background: #00bfff; color: #fff; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <script src="./jsmpeg.min.js"></script>
</head>
<body>

    <h2>短视频 UC 防劫持测试</h2>
    
    <div class="wrapper">
        <canvas id="video-canvas"></canvas>
        <div class="btn-box">
            <button class="play-btn" id="ctrl-btn">点击激活并播放</button>
        </div>
    </div>

    <script>
        // 3. 填入你真实的 Cloudflare R2 视频地址
        // 💡 结合你图 1 的截图，注意看你在 R2 里的文件名到底带不带 .ts 后缀，必须完全一致
        const myR2VideoUrl = 'https://你的R2公开域名/1987295692190133024.ts'; 

        const btn = document.getElementById('ctrl-btn');
        const canvas = document.getElementById('video-canvas');
        
        // 此时 window.JSMpeg 绝对存在了
        const player = new JSMpeg.Player(myR2VideoUrl, {
            canvas: canvas,
            autoplay: false,
            loop: true,
            volume: 0,
            progressive: true
        });

        btn.addEventListener('click', function() {
            if (player.isPlaying) {
                player.pause();
                btn.innerText = "已暂停";
            } else {
                player.volume = 1; 
                player.play();
                btn.innerText = "正在纯净播放";
            }
        });
    </script>
</body>
</html>
