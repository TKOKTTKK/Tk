<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>JSMpeg 播放测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #wrapper {
      width: 100vw;
      /* 高度按视频比例自动撑开 */
    }
    /* JSMpeg 自动生成的 canvas */
    #wrapper canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    #status {
      position: fixed;
      top: 20px; left: 0; right: 0;
      color: #fff; font-size: 14px;
      font-family: -apple-system, sans-serif;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="status">⏳ 加载中...</div>
  <div id="wrapper"></div>

  <!-- 使用 @cycjimmy/jsmpeg-player，内含最新版 JSMpeg + iOS 音频自动解锁 -->
  <script src="https://cdn.jsdelivr.net/npm/@cycjimmy/jsmpeg-player@6/dist/jsmpeg-player.umd.min.js"></script>
  <script>
    var videoUrl = 'https://jsmpeg.com/bjork-all-is-full-of-love.ts';

    var videoElement = new JSMpeg.VideoElement('#wrapper', videoUrl, {
      autoplay: true,
      loop: true,
      autoSetWrapperSize: true,
    });

    // 监听第一帧解码完成，隐藏加载提示
    var originalDecode = videoElement.player.renderer && videoElement.player.renderer.renderFrame;
    var statusEl = document.getElementById('status');
    var hidden = false;

    // 简单定时检测：有画面就隐藏 status
    var checkTimer = setInterval(function() {
      if (!hidden && videoElement.player && videoElement.player.isPlaying) {
        statusEl.style.display = 'none';
        hidden = true;
        clearInterval(checkTimer);
      }
    }, 500);

    // 10秒超时提示
    setTimeout(function() {
      if (!hidden) {
        statusEl.textContent = '❌ 加载失败，请检查网络或 CORS';
      }
    }, 10000);
  </script>
</body>
</html>
