<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>JSMpeg 播放测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #status {
      position: fixed;
      top: 20px;
      left: 0; right: 0;
      text-align: center;
      font-size: 14px;
      color: #aaa;
      z-index: 10;
    }
    canvas {
      width: 100vw !important;
      height: auto !important;
      display: block;
    }
  </style>
</head>
<body>
  <div id="status">⏳ 加载中...</div>
  <canvas id="canvas"></canvas>

  <!-- 旧版 jsmpeg，支持 .mpg 格式 -->
  <script src="https://jsmpeg.com/bjork-all-is-full-of-love.ts"></script>
  <script>
    var canvas = document.getElementById('canvas');
    var videoUrl = 'https://pub-bd77bd83901245459c0a9fac4a491765.r2.dev/1987295692190133024%202.mpg';

    var player = new jsmpeg(videoUrl, {
      canvas: canvas,
      autoplay: true,
      loop: true,
      onload: function() {
        document.getElementById('status').style.display = 'none';
      }
    });
  </script>
</body>
</html>
