<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>WebCodecs Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, sans-serif;
    }
    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    #status {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      letter-spacing: 0.03em;
    }
    #progress-bar {
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.2s;
    }
    #tap-btn {
      display: none;
      margin-top: 8px;
      padding: 10px 28px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 24px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #error {
      display: none;
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      padding: 0 32px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <div id="status">正在加载...</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <button id="tap-btn" onclick="startAudio()">▶ 点击开启声音</button>
    <div id="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
  <script>
  (function() {
    const VIDEO_URL = 'https://pub-bd77bd83901245459c0a9fac4a491765.r2.dev/1987295692190133024%202.MP4';

    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const statusEl   = document.getElementById('status');
    const fillEl     = document.getElementById('progress-fill');
    const overlayEl  = document.getElementById('overlay');
    const tapBtn     = document.getElementById('tap-btn');
    const errorEl    = document.getElementById('error');

    // ── 检查 WebCodecs 支持 ──────────────────────────────────
    if (typeof VideoDecoder === 'undefined') {
      showError('此浏览器不支持 WebCodecs API<br>请使用 Chrome / Safari 16.4+ / Edge');
      return;
    }

    // ── 状态变量 ──────────────────────────────────────────────
    let decoder       = null;
    let audioCtx      = null;
    let frameQueue    = [];        // 待渲染帧队列
    let frameTimings  = [];        // { ts, frame } 已解码帧
    let playing       = false;
    let startTime     = 0;         // audioCtx.currentTime 对应的视频起始时间
    let videoWidth    = 0;
    let videoHeight   = 0;
    let totalSamples  = 0;
    let decodedSamples = 0;
    let rafId         = null;
    let mp4boxFile    = null;
    let trackId       = -1;
    let pendingFrames = 0;         // 已送入 decoder 未输出的帧数
    const MAX_QUEUE   = 60;        // 最多预解码帧数

    // ── 错误显示 ──────────────────────────────────────────────
    function showError(msg) {
      overlayEl.style.display = 'flex';
      statusEl.style.display = 'none';
      document.getElementById('progress-bar').style.display = 'none';
      errorEl.innerHTML = msg;
      errorEl.style.display = 'block';
    }

    // ── iOS 音频解锁 ──────────────────────────────────────────
    function startAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      tapBtn.style.display = 'none';
    }

    // ── Canvas 尺寸适配 ───────────────────────────────────────
    function fitCanvas(w, h) {
      canvas.width  = w;
      canvas.height = h;
      const scaleX = window.innerWidth  / w;
      const scaleY = window.innerHeight / h;
      const scale  = Math.min(scaleX, scaleY);
      canvas.style.width  = (w * scale) + 'px';
      canvas.style.height = (h * scale) + 'px';
      canvas.style.left   = ((window.innerWidth  - w * scale) / 2) + 'px';
      canvas.style.top    = ((window.innerHeight - h * scale) / 2) + 'px';
    }

    // ── 渲染循环 ──────────────────────────────────────────────
    function renderLoop() {
      rafId = requestAnimationFrame(renderLoop);
      if (!playing || frameTimings.length === 0) return;

      const now = audioCtx
        ? audioCtx.currentTime - startTime
        : (performance.now() / 1000 - startTime);

      // 找最近一帧
      while (frameTimings.length > 1 && frameTimings[1].ts <= now) {
        frameTimings.shift().frame.close();
      }

      const current = frameTimings[0];
      if (current && current.ts <= now + 0.05) {
        ctx.drawImage(current.frame, 0, 0);
      }
    }

    // ── VideoDecoder 初始化 ───────────────────────────────────
    function initDecoder(config) {
      decoder = new VideoDecoder({
        output: (frame) => {
          pendingFrames--;
          const ts = frame.timestamp / 1_000_000; // μs → s
          frameTimings.push({ ts, frame });

          // 首帧：初始化 canvas、开始播放
          if (!playing) {
            videoWidth  = frame.displayWidth;
            videoHeight = frame.displayHeight;
            fitCanvas(videoWidth, videoHeight);

            playing   = true;
            startTime = audioCtx
              ? audioCtx.currentTime
              : performance.now() / 1000;

            overlayEl.style.display = 'none';
            renderLoop();

            // iOS 提示
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            if (isIOS) {
              tapBtn.style.display = 'block';
              overlayEl.style.display = 'flex';
              statusEl.style.display  = 'none';
              document.getElementById('progress-bar').style.display = 'none';
            }
          }
        },
        error: (e) => showError('解码失败：' + e.message),
      });

      decoder.configure(config);
    }

    // ── MP4Box 解封装 + 送帧 ─────────────────────────────────
    function startDemux() {
      mp4boxFile = MP4Box.createFile();

      mp4boxFile.onReady = (info) => {
        // 找第一条视频轨
        const vTrack = info.videoTracks[0];
        if (!vTrack) { showError('视频中没有视频轨'); return; }

        trackId      = vTrack.id;
        totalSamples = vTrack.nb_samples;

        // 解析 codec 描述
        const codec = vTrack.codec;
        statusEl.textContent = '解码中...';

        // 提取 avcC / hvcC extradata
        let description;
        try {
          const trak = mp4boxFile.getTrackById(trackId);
          for (const entry of trak.mdia.minf.stbl.stsd.entries) {
            const box = entry.avcC || entry.hvcC || entry.vpcC;
            if (box) {
              const stream = new DataStream(undefined, 0, DataStream.BIG_ENDIAN);
              box.write(stream);
              description = new Uint8Array(stream.buffer, 8);
              break;
            }
          }
        } catch(e) {}

        initDecoder({
          codec,
          codedWidth:  vTrack.track_width,
          codedHeight: vTrack.track_height,
          description,
          optimizeForLatency: false,
        });

        mp4boxFile.setExtractionOptions(trackId, null, { nbSamples: 100 });
        mp4boxFile.start();
      };

      mp4boxFile.onSamples = (id, user, samples) => {
        for (const s of samples) {
          // 队列满时等待
          if (pendingFrames > MAX_QUEUE) break;

          const chunk = new EncodedVideoChunk({
            type      : s.is_sync ? 'key' : 'delta',
            timestamp : s.cts * 1_000_000 / s.timescale, // → μs
            duration  : s.duration * 1_000_000 / s.timescale,
            data      : s.data,
          });
          decoder.decode(chunk);
          pendingFrames++;
          decodedSamples++;

          // 更新进度条（解封装进度）
          fillEl.style.width = Math.min(100, decodedSamples / totalSamples * 100) + '%';
        }
      };

      mp4boxFile.onError = (e) => showError('解封装失败：' + e);

      // ── fetch + 分块送入 MP4Box ──────────────────────────
      fetch(VIDEO_URL)
        .then(res => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const total = parseInt(res.headers.get('content-length') || '0');
          const reader = res.body.getReader();
          let offset = 0;

          function pump() {
            return reader.read().then(({ done, value }) => {
              if (done) { mp4boxFile.flush(); return; }
              const buf = value.buffer;
              buf.fileStart = offset;
              offset += buf.byteLength;
              if (total) fillEl.style.width = Math.min(95, offset / total * 100) + '%';
              mp4boxFile.appendBuffer(buf);
              return pump();
            });
          }
          return pump();
        })
        .catch(e => showError('加载失败：' + e.message + '<br>请检查 R2 CORS 配置'));
    }

    // ── 初始化音频上下文并开始 ───────────────────────────────
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      audioCtx = null; // 没有音频也能播视频
    }

    startDemux();
  })();
  </script>
</body>
</html>
