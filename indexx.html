<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>JSMpeg 播放测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }
    #status {
      position: fixed;
      top: 20px;
      left: 0; right: 0;
      text-align: center;
      font-size: 14px;
      color: #aaa;
      z-index: 10;
      padding: 0 20px;
    }
    #container {
      width: 100vw;
      max-width: 640px;
    }
    #container canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    #tap-tip {
      position: fixed;
      bottom: 40px;
      left: 0; right: 0;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      display: none;
    }
  </style>
</head>
<body>
  <div id="status">⏳ 加载中...</div>
  <div id="container"></div>
  <div id="tap-tip">👆 点击屏幕开启声音</div>

  <script src="https://raw.githubusercontent.com/phoboslab/jsmpeg/master/jsmpeg.min.js"></script>
  <script>
    // 使用 jsmpeg 官网自己的测试视频
    const videoUrl = 'https://jsmpeg.com/video.ts';

    const status = document.getElementById('status');

    const player = new JSMpeg.Player(videoUrl, {
      container: document.getElementById('container'),
      autoplay: true,
      loop: true,
      audio: true,
      onSourceEstablished: () => {
        status.textContent = '✅ 连接成功，解码中...';
      },
      onVideoDecode: () => {
        status.style.display = 'none';
      },
    });

    // iOS 音频解锁
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      document.getElementById('tap-tip').style.display = 'block';
      document.addEventListener('click', () => {
        if (player.audioOut) player.audioOut.unlock();
        document.getElementById('tap-tip').style.display = 'none';
      }, { once: true });
    }
  </script>
</body>
</html>
