<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
  /* 彻底重置：消除所有可能导致“左上黑边”的默认边距 */
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100vw;
    height: 100dvh; /* 使用 dvh 自动规避手机地址栏高度变化 */
    background: #000;
    overflow: hidden;
  }

  .scroll-container {
    width: 100%;
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  .scroll-container::-webkit-scrollbar { display: none; }

  .video-section {
    width: 100vw;
    height: 100dvh;
    scroll-snap-align: start;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  video {
    /* 自动撑满的核心：铺满并裁切 */
    width: 100%;
    height: 100%;
    object-fit: cover; 
    
    /* 绝对定位防止任何 inline 间隙导致的位移 */
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>

<div class="scroll-container">
  <div class="video-section">
    <video class="main-video" loop playsinline src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeie53svjmqhznjlosvlkvtu7cckzrgwexo3h2ljvartpuhzsr3kdki"></video>
  </div>
  <div class="video-section">
    <video class="main-video" loop playsinline src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeifskd2zsnlquiyp4bdv2q2b2rzukscpr6lurer75buhy6qgb545ea"></video>
  </div>
</div>

<script>
  // 自动播放逻辑
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.play().catch(() => {});
      } else {
        entry.target.pause();
        entry.target.currentTime = 0;
      }
    });
  }, { threshold: 0.6 });

  document.querySelectorAll('video').forEach(vid => observer.observe(vid));
</script>

</body>
</html>
