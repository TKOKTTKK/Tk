<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>抖音风格 WebCodecs 播放器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }

    /* ── 竖向滑动容器 ── */
    #feed {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #feed::-webkit-scrollbar { display: none; }

    .page {
      position: relative;
      width: 100%; height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background: #000;
      overflow: hidden;
    }

    .page canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .page-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      z-index: 5; pointer-events: none;
    }
    .status { color: rgba(255,255,255,0.75); font-size: 13px; }
    .bar-wrap { width: 140px; height: 2px; background: rgba(255,255,255,0.15); border-radius: 2px; }
    .bar-fill { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width .15s; }
    .err { display: none; color: #ff6b6b; font-size: 12px; text-align: center; padding: 0 28px; line-height: 1.8; }

    /* 点击层（透明，捕获播放/暂停） */
    .tap-layer {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 8; cursor: pointer;
    }

    /* ── 巨型中置播放按钮 ── */
    .center-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 66px; height: 66px; background: rgba(0, 0, 0, 0.4); border-radius: 50%;
      display: none; align-items: center; justify-content: center; z-index: 11; pointer-events: none;
    }
    .center-play svg { margin-left: 4px; width: 30px; height: 30px; }

    /* ════════ 顶部栏 ════════ */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 20; pointer-events: none;
      padding-top: env(safe-area-inset-top, 0);
    }

    .nav-tabs {
      display: flex; align-items: center; gap: 18px;
      padding: 14px 18px 12px; color: rgba(255,255,255,0.6);
      font-size: 17px; pointer-events: auto;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tabs .menu-icon { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
    .nav-tabs .menu-icon span { width: 18px; height: 2px; background: #fff; border-radius: 2px; }
    .nav-tabs .menu-icon span:nth-child(2){ width: 13px; }
    .nav-tabs .tab { flex-shrink: 0; position: relative; padding-bottom: 4px; }
    .nav-tabs .tab.active { color: #fff; font-weight: 600; }
    .nav-tabs .tab.active::after {
      content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
      width: 16px; height: 2.5px; background: #fff; border-radius: 2px;
    }
    .nav-tabs .search { margin-left: auto; flex-shrink: 0; }
    .nav-tabs .search svg { width: 22px; height: 22px; fill: #fff; }

    /* ════════ 右侧边栏 ════════ */
    .sidebar {
      position: absolute; right: 10px; bottom: 110px;
      z-index: 20; display: flex; flex-direction: column;
      align-items: center; gap: 20px;
    }
    .sidebar .avatar-wrap { position: relative; margin-bottom: 6px; }
    .sidebar .avatar {
      width: 50px; height: 50px; border-radius: 50%;
      border: 2px solid #fff; object-fit: cover; display: block;
      background: #333;
    }
    .sidebar .follow {
      position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 20px; background: #fe2c55; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar .follow svg { width: 12px; height: 12px; fill: #fff; }
    .sidebar .action { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .sidebar .action svg { width: 38px; height: 38px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
    .sidebar .action.liked svg path { fill: #fe2c55; }
    .sidebar .action span { color: #fff; font-size: 13px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
    .sidebar .disc {
      width: 50px; height: 50px; border-radius: 50%;
      background: #1a1a1a; border: 8px solid #000;
      display: flex; align-items: center; justify-content: center;
      animation: spin 4s linear infinite; margin-top: 8px;
    }
    .sidebar .disc img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════ 底部信息 ════════ */
    .bottom-info {
      position: absolute; left: 0; right: 70px; bottom: 78px;
      z-index: 20; padding: 0 16px; color: #fff;
    }
    .bottom-info .author { font-size: 17px; font-weight: 700; margin-bottom: 10px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
    .bottom-info .desc {
      font-size: 15px; line-height: 1.4; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      display: flex; align-items: center; gap: 6px;
    }
    .bottom-info .desc svg { width: 14px; height: 14px; fill: #fff; opacity: .8; }

    /* ════════ 底部导航栏 ════════ */
    .bottom-nav {
      position: absolute; left: 0; right: 0; bottom: 0;
      z-index: 25; height: 64px; background: #000;
      display: flex; align-items: center; justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-top: .5px solid rgba(255,255,255,0.08);
    }
    .bottom-nav .nav-item { color: rgba(255,255,255,0.6); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bottom-nav .nav-item.active { color: #fff; font-weight: 600; }
    .bottom-nav .nav-item.active span { font-size: 17px; font-weight: 600; }
    .bottom-nav .nav-item span { font-size: 17px; }
    .bottom-nav .plus {
      width: 44px; height: 30px; border: 2.5px solid #fff; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .bottom-nav .plus svg { width: 20px; height: 20px; fill: #fff; }
  </style>
</head>
<body>
  <div id="feed"></div>

  <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
  <script>
  (function () {
    // ════════════════ 全局配置 ════════════════
    const VIDEO_URL = 'https://s.cccmmm.cc/out_fast%202.bin';   // 视频源（后期可替换）
    const AUDIO_URL = 'https://s.cccmmm.cc/out_fast%20-2.bin';  // 音频源（后期可替换）
    const TOTAL_PAGES = 15;
    const PRELOAD_AHEAD = 2;  // 预加载当前页前后 N 页（抖音式预加载）

    if (typeof VideoDecoder === 'undefined') {
      document.body.innerHTML = '<div style="color:#ff6b6b;display:flex;height:100%;align-items:center;justify-content:center;text-align:center;padding:30px;font-size:14px;line-height:1.8">浏览器不支持 WebCodecs<br>请用 Chrome / Safari 16.4+</div>';
      return;
    }

    // ════════════════ 共享音频缓冲（所有页面复用同一个音频解码结果）════════════════
    let sharedAudioCtx = null;
    let sharedAudioBuffer = null;
    let audioLoadPromise = null;
    try { sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}

    // ════════════════ 全局音频解锁：任意首次触摸/点击都尝试唤醒 AudioContext ════════════════
    // 自动播放策略要求 resume() 必须发生在真实的用户手势回调里。这里把"任意触摸/点击"都当作
    // 手势来源，而不是只在点击视频本身时才 resume —— 这样划动到下一条视频这个动作的 touchstart
    // 本身也能提前把音频解锁掉，不需要专门去点一下视频。resume() 在已运行时调用是无副作用的，
    // 所以监听器一直挂着即可（比如后台切回前台导致 ctx 被系统挂起，再摸一下屏幕也能自动恢复）。
    function unlockAudioOnGesture() {
      if (sharedAudioCtx && sharedAudioCtx.state === 'suspended') {
        sharedAudioCtx.resume().catch(() => {});
      }
    }
    ['touchstart', 'click'].forEach(evt => {
      document.addEventListener(evt, unlockAudioOnGesture, { passive: true, capture: true });
    });

    function loadSharedAudio() {
      if (audioLoadPromise) return audioLoadPromise;
      audioLoadPromise = fetch(AUDIO_URL)
        .then(res => { if (!res.ok) throw new Error('音频 ' + res.status); return res.arrayBuffer(); })
        .then(buf => {
          if (!sharedAudioCtx) sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
          return sharedAudioCtx.decodeAudioData(buf);
        })
        .then(decoded => { sharedAudioBuffer = decoded; console.log('共享音频解码成功'); return decoded; })
        .catch(err => { console.error('音频加载失败，降级无声:', err); return null; });
      return audioLoadPromise;
    }

    // ════════════════ 共享视频样本缓存（只解封装一次，所有页面复用）════════════════
    let sharedSamples = null;          // 解封装后的全部视频 samples
    let sharedDecoderConfig = null;    // VideoDecoder 配置
    let sharedDuration = 0;
    let videoLoadPromise = null;

    function loadSharedVideo(onProgress) {
      if (videoLoadPromise) return videoLoadPromise;
      videoLoadPromise = new Promise((resolve, reject) => {
        const mp4File = MP4Box.createFile();
        let trackId = -1, totalNb = 0;
        const allSamples = [];

        mp4File.onReady = (info) => {
          const vt = info.videoTracks[0];
          if (!vt) { reject(new Error('找不到视频轨')); return; }
          trackId = vt.id;
          totalNb = vt.nb_samples;
          sharedDuration = vt.duration / vt.timescale;

          let description;
          try {
            const trak = mp4File.getTrackById(trackId);
            for (const entry of trak.mdia.minf.stbl.stsd.entries) {
              const box = entry.avcC || entry.hvcC || entry.vpcC;
              if (box) {
                const stream = new DataStream(undefined, 0, DataStream.BIG_ENDIAN);
                box.write(stream);
                description = new Uint8Array(stream.buffer, 8);
                break;
              }
            }
          } catch(e) {}

          sharedDecoderConfig = {
            codec: vt.codec,
            codedWidth: vt.track_width,
            codedHeight: vt.track_height,
            description,
            optimizeForLatency: false,
          };

          mp4File.setExtractionOptions(trackId, null, { nbSamples: 100 });
          mp4File.start();
        };

        mp4File.onSamples = (id, user, samples) => {
          for (const s of samples) {
            allSamples.push({
              type: s.is_sync ? 'key' : 'delta',
              timestamp: s.cts * 1_000_000 / s.timescale,
              duration: s.duration * 1_000_000 / s.timescale,
              data: new Uint8Array(s.data),
            });
          }
          mp4File.releaseUsedSamples(trackId, samples[samples.length - 1].number);
          if (onProgress) onProgress(Math.min(100, allSamples.length / totalNb * 100));
          if (allSamples.length >= totalNb) {
            sharedSamples = allSamples;
            resolve(allSamples);
          }
        };

        mp4File.onError = (e) => reject(new Error('MP4解析失败: ' + e));

        fetch(VIDEO_URL)
          .then(res => {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const total = +res.headers.get('content-length') || 0;
            const reader = res.body.getReader();
            let offset = 0;
            function pump() {
              return reader.read().then(({ done, value }) => {
                if (done) { mp4File.flush(); return; }
                const buf = value.buffer.slice(0);
                buf.fileStart = offset;
                offset += buf.byteLength;
                if (onProgress && total) onProgress(Math.min(90, offset / total * 100));
                mp4File.appendBuffer(buf);
                return pump();
              });
            }
            return pump();
          })
          .catch(reject);
      });
      return videoLoadPromise;
    }

    // ════════════════ 单页播放器 ════════════════
    class VideoPage {
      constructor(index, pageEl) {
        this.index = index;
        this.pageEl = pageEl;
        this.canvas = pageEl.querySelector('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.overlay = pageEl.querySelector('.page-overlay');
        this.statusEl = pageEl.querySelector('.status');
        this.fillEl = pageEl.querySelector('.bar-fill');
        this.errEl = pageEl.querySelector('.err');
        this.centerPlayBtn = pageEl.querySelector('.center-play');

        this.frames = [];
        this.playing = false;
        this.playStart = 0;
        this.pausedTime = 0;
        this.duration = 0;
        this.canvasReady = false;   // canvas 是否已适配过尺寸

        this.rafId = null;          // 修复①：deactivate 时 cancel
        this.decoder = null;
        this.feedGen = 0;           // 修复④：每轮 feed 的代数，防止旧 feed 干扰新轮
        this.audioSource = null;
        this.audioStartTimeCtx = 0;
        this.audioStartTimeVideo = 0;

        this.prepared = false;      // 修复②：prepare 只解首帧，activate 复用
        this.active = false;
        this.audioHintShown = false; // 音频被自动播放策略锁住时，是否正在显示提示

        pageEl.querySelector('.tap-layer').addEventListener('click', () => {
          if (sharedAudioCtx && sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
          this.togglePlay();
        });
      }

      showErr(msg) {
        this.errEl.innerHTML = msg; this.errEl.style.display = 'block';
        this.statusEl.style.display = 'none';
        this.pageEl.querySelector('.bar-wrap').style.display = 'none';
      }

      // canvas 只需适配一次，转屏时不重算（当前场景固定竖屏）
      fitCanvas(w, h) {
        if (this.canvasReady) return;
        this.canvasReady = true;
        this.canvas.width = w; this.canvas.height = h;
        const s = Math.max(innerWidth / w, innerHeight / h);
        this.canvas.style.width = w * s + 'px';
        this.canvas.style.height = h * s + 'px';
        this.canvas.style.left = (innerWidth - w * s) / 2 + 'px';
        this.canvas.style.top = (innerHeight - h * s) / 2 + 'px';
        this.overlay.style.display = 'none';
      }

      startAudioNode(timestamp) {
        if (!sharedAudioBuffer || !this.active) return;
        if (sharedAudioCtx.state === 'suspended') sharedAudioCtx.resume();
        this.audioSource = sharedAudioCtx.createBufferSource();
        this.audioSource.buffer = sharedAudioBuffer;
        this.audioSource.connect(sharedAudioCtx.destination);
        this.audioStartTimeCtx = sharedAudioCtx.currentTime;
        this.audioStartTimeVideo = timestamp;
        this.audioSource.start(0, timestamp);
      }

      stopAudioNode() {
        if (this.audioSource) {
          try { this.audioSource.stop(); } catch(e) {}
          this.audioSource = null;
        }
      }

      // 修复①：统一通过这个方法停 rAF
      stopRaf() {
        if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
      }

      // 修复③：统一通过这个方法释放所有帧
      flushFrames() {
        this.frames.forEach(f => f.frame.close());
        this.frames = [];
      }

      closeDecoder() {
        if (this.decoder && this.decoder.state !== 'closed') this.decoder.close();
        this.decoder = null;
      }

      openDecoder() {
        this.decoder = new VideoDecoder({
          output: (frame) => {
            this.frames.push({ ts: frame.timestamp / 1_000_000, frame });
          },
          error: (e) => this.showErr('解码错误: ' + e.message),
        });
        this.decoder.configure(sharedDecoderConfig);
      }

      // 修复④：限流 feed，控制 decodeQueueSize，防止内存暴涨
      // feedGen 机制确保旧 feed 循环在 loopPlayback/deactivate 后立即退出
      async feedSamplesThrottled() {
        const gen = ++this.feedGen;
        const MAX_QUEUE = 8;
        for (const s of sharedSamples) {
          if (gen !== this.feedGen || !this.active || !this.decoder || this.decoder.state === 'closed') break;
          while (this.decoder && this.decoder.decodeQueueSize >= MAX_QUEUE) {
            await new Promise(r => setTimeout(r, 4));
            if (gen !== this.feedGen || !this.active) return;
          }
          try {
            this.decoder.decode(new EncodedVideoChunk({
              type: s.type, timestamp: s.timestamp, duration: s.duration, data: s.data,
            }));
          } catch(e) { break; }
        }
        if (gen === this.feedGen && this.decoder && this.decoder.state !== 'closed' && this.active) {
          this.decoder.flush().catch(() => {});
        }
      }

      scheduleRender() {
        this.rafId = requestAnimationFrame(() => this.scheduleRender());
        if (!this.active) return;

        // 视觉容错 + 自动恢复：检测音频是否被自动播放策略锁住
        if (this.playing && sharedAudioBuffer) {
          const locked = sharedAudioCtx.state !== 'running';
          if (locked && !this.audioHintShown) {
            // 锁住了：露出中间播放按钮，提示用户点一下屏幕
            this.audioHintShown = true;
            this.centerPlayBtn.style.display = 'flex';
          } else if (!locked && this.audioHintShown) {
            // 刚解锁成功（可能是全局监听器在别处摸了一下屏幕触发的）：
            // 自动重新挂载音频，对齐当前已播放到的位置，不需要用户手动点暂停再点播放
            this.audioHintShown = false;
            this.centerPlayBtn.style.display = 'none';
            const elapsed = this.audioSource
              ? Math.max(0, sharedAudioCtx.currentTime - this.audioStartTimeCtx + this.audioStartTimeVideo)
              : Math.max(0, (performance.now() - this.playStart) / 1000);
            this.stopAudioNode();
            this.startAudioNode(elapsed);
          } else if (!locked && !this.audioSource) {
            // 没被锁住，只是音频比画面晚加载完：对齐当前进度直接接上即可
            const elapsed = Math.max(0, (performance.now() - this.playStart) / 1000);
            this.startAudioNode(elapsed);
          }
        }

        let now = this.pausedTime;
        if (this.playing) {
          if (sharedAudioBuffer && this.audioSource) {
            now = sharedAudioCtx.currentTime - this.audioStartTimeCtx + this.audioStartTimeVideo;
          } else {
            now = (performance.now() - this.playStart) / 1000;
          }
        }
        if (this.duration && now >= this.duration) { this.loopPlayback(); return; }
        if (this.frames.length === 0) return;
        while (this.frames.length > 1 && this.frames[1].ts <= now) {
          this.frames.shift().frame.close();
        }
        const f = this.frames[0];
        if (f && f.ts <= now + 0.05) this.ctx.drawImage(f.frame, 0, 0);
      }

      loopPlayback() {
        this.flushFrames();   // 修复③：loop 时立即释放旧帧
        this.closeDecoder();  // 关旧 decoder，feedGen 机制会让旧 feed 自动退出

        if (!this.active) return;

        if (this.playing) {
          if (sharedAudioBuffer) { this.stopAudioNode(); this.startAudioNode(0); }
          else this.playStart = performance.now();
        } else {
          this.pausedTime = 0;
        }
        this.openDecoder();
        this.feedSamplesThrottled(); // 不 await，渲染循环继续跑
      }

      togglePlay() {
        if (!this.active) return;
        if (this.playing) {
          this.playing = false;
          if (sharedAudioBuffer && this.audioSource) {
            this.pausedTime = sharedAudioCtx.currentTime - this.audioStartTimeCtx + this.audioStartTimeVideo;
            this.stopAudioNode();
          } else {
            this.pausedTime = (performance.now() - this.playStart) / 1000;
          }
          this.centerPlayBtn.style.display = 'flex';
        } else {
          this.playing = true;
          if (sharedAudioBuffer) this.startAudioNode(this.pausedTime);
          else this.playStart = performance.now() - this.pausedTime * 1000;
          this.centerPlayBtn.style.display = 'none';
        }
      }

      // 修复②：prepare 只解第一个关键帧画到 canvas，不启动渲染循环，不保留 decoder
      async prepare() {
        if (this.prepared) return;
        this.prepared = true;
        try {
          await loadSharedVideo((p) => { this.fillEl.style.width = p + '%'; });
          this.duration = sharedDuration;

          const keySample = sharedSamples.find(s => s.type === 'key');
          if (!keySample) return;

          await new Promise((resolve) => {
            const dec = new VideoDecoder({
              output: (frame) => {
                this.fitCanvas(frame.displayWidth, frame.displayHeight);
                this.ctx.drawImage(frame, 0, 0);
                frame.close();             // 修复③：画完立即释放，不留在 frames
                if (dec.state !== 'closed') dec.close();
                resolve();
              },
              error: () => resolve(),      // 失败也不卡住
            });
            dec.configure(sharedDecoderConfig);
            dec.decode(new EncodedVideoChunk({
              type: keySample.type, timestamp: keySample.timestamp,
              duration: keySample.duration, data: keySample.data,
            }));
            dec.flush().catch(() => resolve());
          });
        } catch(e) {
          this.showErr('预加载失败: ' + e.message);
        }
      }

      // 修复②：activate 复用 prepare 的 canvas 适配结果，不再二次解码
      async activate() {
        this.active = true;
        await this.prepare();        // 已经完成则直接返回

        this.stopRaf();              // 修复①：先停旧循环
        this.flushFrames();          // 修复③：清空残留帧
        this.closeDecoder();         // 关旧 decoder（兜底）

        this.pausedTime = 0;
        this.playing = true;
        this.audioHintShown = false; // 重置音频锁定提示状态

        this.openDecoder();
        this.scheduleRender();       // 先启动渲染循环

        if (sharedAudioBuffer) { this.stopAudioNode(); this.startAudioNode(0); }
        else this.playStart = performance.now();

        this.centerPlayBtn.style.display = 'none';
        this.feedSamplesThrottled(); // 修复④：限流异步 feed，不 await
      }

      // 修复①③：deactivate 停 rAF、释放帧、关 decoder
      deactivate() {
        this.active = false;
        this.playing = false;
        this.stopAudioNode();
        this.stopRaf();              // 修复①：真正停掉 rAF
        this.flushFrames();          // 修复③：释放所有帧，不再堆积
        this.closeDecoder();         // 关 decoder，feedGen 自动让旧 feed 退出
        this.pausedTime = 0;
        if (this.audioHintShown) {
          this.audioHintShown = false;
          this.centerPlayBtn.style.display = 'none';
        }
        // prepared 保留 true，下次 activate 无需重新加载首帧
      }
    }

    // ════════════════ 构建页面 DOM ════════════════
    const feed = document.getElementById('feed');
    const pages = [];

    const SIDEBAR_HTML = (idx) => `
      <div class="sidebar">
        <div class="avatar-wrap">
          <div class="avatar"></div>
          <div class="follow"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg></div>
        </div>
        <div class="action like"><svg viewBox="0 0 24 24"><path fill="#fff" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span class="like-count">2408</span></div>
        <div class="action comment"><svg viewBox="0 0 24 24"><path fill="#fff" d="M12 2C6.48 2 2 6.04 2 11c0 2.6 1.23 4.94 3.2 6.57L4 22l4.78-1.7c1 .26 2.08.4 3.22.4 5.52 0 10-4.04 10-9s-4.48-9-10-9z"/></svg><span>711</span></div>
        <div class="action collect"><svg viewBox="0 0 24 24"><path fill="#fff" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><span>288</span></div>
        <div class="action share"><svg viewBox="0 0 24 24"><path fill="#fff" d="M21 12l-9-9v5C6 9 3 14 2 19c2.5-3.5 6-5.1 10-5.1V19l9-7z"/></svg><span>6435</span></div>
        <div class="disc"><img class="disc-img" alt=""></div>
      </div>`;

    const TOPBAR_HTML = `
      <div class="top-bar">
        <div class="nav-tabs">
          <div class="menu-icon"><span></span><span></span><span></span></div>
          <div class="tab">热点</div>
          <div class="tab">精选</div>
          <div class="tab">经验</div>
          <div class="tab">直播</div>
          <div class="tab">朋友</div>
          <div class="tab">关注</div>
          <div class="tab active">推荐</div>
          <div class="search"><svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div>
        </div>
      </div>`;

    const BOTTOMNAV_HTML = `
      <div class="bottom-nav">
        <div class="nav-item active"><span>首页</span></div>
        <div class="nav-item"><span>商城</span></div>
        <div class="nav-item"><div class="plus"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg></div></div>
        <div class="nav-item"><span>消息</span></div>
        <div class="nav-item"><span>我</span></div>
      </div>`;

    for (let i = 0; i < TOTAL_PAGES; i++) {
      const page = document.createElement('div');
      page.className = 'page';
      page.dataset.index = i;
      page.innerHTML = `
        <canvas></canvas>
        <div class="tap-layer"></div>
        <div class="center-play"><svg viewBox="0 0 24 24"><path fill="#fff" d="M8 5v14l11-7z"/></svg></div>
        <div class="page-overlay">
          <div class="status">正在加载...</div>
          <div class="bar-wrap"><div class="bar-fill"></div></div>
          <div class="err"></div>
        </div>
        ${TOPBAR_HTML}
        ${SIDEBAR_HTML(i)}
        <div class="bottom-info">
          <div class="author">@吃个泡芙</div>
          <div class="desc">宁波椒麻鱼大王！<svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div>
        </div>
        ${BOTTOMNAV_HTML}
      `;
      feed.appendChild(page);
      pages.push(new VideoPage(i, page));
    }

    // ════════════════ 滑动检测 + 抖音式预加载 ════════════════
    let currentIndex = -1;

    function setActive(idx) {
      if (idx === currentIndex) return;
      // 停掉旧页
      if (currentIndex >= 0 && pages[currentIndex]) pages[currentIndex].deactivate();
      currentIndex = idx;
      // 激活当前页
      pages[idx].activate();
      // 预加载前后页（抖音式预加载）
      for (let d = 1; d <= PRELOAD_AHEAD; d++) {
        if (pages[idx + d]) pages[idx + d].prepare();
        if (pages[idx - d]) pages[idx - d].prepare();
      }
    }

    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
          setActive(parseInt(entry.target.dataset.index, 10));
        }
      });
    }, { threshold: [0.6] });

    pages.forEach(p => io.observe(p.pageEl));

    // ════════════════ 启动 ════════════════
    loadSharedAudio();
    // 首页立即激活
    setActive(0);
  })();
  </script>
</body>
</html>
