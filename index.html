<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>抖音UI高仿版</title>
<style>
  :root {
    --red: #fe2c55;
    --cyan: #25f4ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    color: #fff;
    user-select: none;
  }

  /* ── 视频全屏 ── */
  #videoLayer {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  #mainVideo {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── 渐变遮罩 ── */
  .mask-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
    z-index: 2; pointer-events: none;
  }
  .mask-bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 350px;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
    z-index: 2; pointer-events: none;
  }

  /* ══════════════════════════════
     顶部导航 
  ══════════════════════════════ */
  .top-nav {
    position: fixed;
    top: env(safe-area-inset-top, 44px);
    left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 44px;
  }

  .nav-menu {
    width: 30px;
    display: flex; flex-direction: column; gap: 5px;
    flex-shrink: 0; cursor: pointer;
  }
  .nav-menu span {
    display: block; height: 2px; background: #fff;
    border-radius: 1px;
  }
  .nav-menu span:nth-child(2) { width: 75%; }

  .nav-tabs {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 16px; overflow-x: auto; scrollbar-width: none;
    padding: 0 10px;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex-shrink: 0; font-size: 16px; color: rgba(255,255,255,0.7);
    font-weight: 500; cursor: pointer; white-space: nowrap;
    position: relative; line-height: 44px; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .nav-tab.active { color: #fff; font-size: 18px; font-weight: bold; }
  .nav-tab.active::after {
    content: ''; position: absolute; bottom: 4px; left: 50%;
    transform: translateX(-50%); width: 20px; height: 3px;
    background: #fff; border-radius: 2px;
  }

  .nav-search {
    width: 30px; display: flex; align-items: center; justify-content: flex-end;
    flex-shrink: 0; cursor: pointer;
  }

  /* ══════════════════════════════
     右侧操作栏
  ══════════════════════════════ */
  .side-bar {
    position: fixed; right: 10px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 75px);
    z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 0;
  }

  .avatar-wrap {
    width: 50px; height: 50px; position: relative; margin-bottom: 25px;
  }
  .avatar-img {
    width: 50px; height: 50px; border-radius: 50%;
    border: 1.5px solid #fff; object-fit: cover;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
  
  .avatar-plus {
    position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 20px; background: var(--red); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold; color: #fff; line-height: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .side-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    margin-bottom: 16px; cursor: pointer;
  }
  .side-btn .icon-wrap {
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  }
  .side-btn .icon-wrap svg { filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5)); }
  .side-btn .label {
    font-size: 13px; color: #fff; font-weight: 500;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6); text-align: center;
  }

  #heartIcon { transition: fill 0.15s; }

  .disc-wrap { width: 46px; height: 46px; margin-top: 10px; }
  .disc {
    width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #444 0%, #222 45%, #111 100%);
    border: 7px solid #2a2a2a; animation: discSpin 4s linear infinite;
    position: relative; overflow: hidden;
  }
  .disc::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 12px; height: 12px;
    border-radius: 50%; background: #1a1a1a; border: 1px solid #555;
  }
  @keyframes discSpin {
    from { transform: rotate(0deg); } to { transform: rotate(360deg); }
  }

  /* ══════════════════════════════
     底部视频信息
  ══════════════════════════════ */
  .video-info {
    position: fixed; left: 14px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 70px);
    right: 80px; z-index: 10;
  }
  .vi-username {
    font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 8px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .vi-desc {
    font-size: 15px; color: rgba(255,255,255,0.95); line-height: 1.4;
    margin-bottom: 12px; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .vi-desc .expand { font-weight: bold; }
  .vi-music {
    display: flex; align-items: center; gap: 6px; overflow: hidden; width: 60%;
  }
  .vi-music-text {
    font-size: 14px; color: #fff; white-space: nowrap;
    animation: musicScroll 8s linear infinite; display: inline-block;
  }
  @keyframes musicScroll {
    0% { transform: translateX(10%); } 100% { transform: translateX(-100%); }
  }

  /* ══════════════════════════════
     进度条 (新增加)
  ══════════════════════════════ */
  .progress-bar-container {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 48px);
    left: 14px; right: 14px;
    height: 10px; z-index: 15;
    display: flex; align-items: center;
  }
  .progress-bg {
    width: 100%; height: 2px; background: rgba(255,255,255,0.2);
    border-radius: 1px; position: relative;
  }
  .progress-fill {
    width: 12%; /* 演示进度 */ height: 100%;
    background: rgba(255,255,255,0.8); border-radius: 1px;
    position: absolute; top: 0; left: 0;
  }
  .progress-handle {
    width: 6px; height: 6px; background: #fff; border-radius: 50%;
    position: absolute; right: -3px; top: -2px; box-shadow: 0 0 2px rgba(0,0,0,0.5);
  }

  /* ══════════════════════════════
     底部导航栏
  ══════════════════════════════ */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(48px + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: #000; border-top: 0.5px solid rgba(255,255,255,0.1);
    z-index: 20; display: flex; align-items: center;
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; cursor: pointer; height: 100%;
  }
  .tab-label { font-size: 14px; color: rgba(255,255,255,0.6); font-weight: 500; }
  .tab-item.active .tab-label { color: #fff; font-weight: 600; }
  
  .tab-publish { flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; cursor: pointer; }
  .pub-btn { width: 44px; height: 28px; position: relative; display: flex; align-items: center; justify-content: center; }
  .pub-btn::before { content: ''; position: absolute; left: -3px; top: 0; width: 100%; height: 100%; background: var(--cyan); border-radius: 8px; z-index: 0; }
  .pub-btn::after { content: ''; position: absolute; right: -3px; top: 0; width: 100%; height: 100%; background: var(--red); border-radius: 8px; z-index: 0; }
  .pub-inner {
    width: 100%; height: 100%; background: #fff; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1; color: #000; font-size: 22px; font-weight: 400; line-height: 1;
  }

  /* 动画效果 */
  .tap-heart {
    position: fixed; width: 80px; height: 80px; pointer-events: none; z-index: 999;
    transform: translate(-50%, -50%) scale(0); animation: heartFloat 0.8s ease-out forwards;
  }
  @keyframes heartFloat {
    0% { transform: translate(-50%, -50%) scale(0.4) rotate(-15deg); opacity: 0; }
    20% { transform: translate(-50%, -50%) scale(1.2) rotate(-5deg); opacity: 1; }
    80% { transform: translate(-50%, -100px) scale(1) rotate(10deg); opacity: 0.8; }
    100% { transform: translate(-50%, -150px) scale(0.9) rotate(15deg); opacity: 0; }
  }
  .count-bump { animation: countBump 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes countBump { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<div id="videoLayer">
  <video id="mainVideo" src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeie53svjmqhznjlosvlkvtu7cckzrgwexo3h2ljvartpuhzsr3kdki" loop playsinline webkit-playsinline preload="auto"></video>
</div>

<div class="mask-top"></div>
<div class="mask-bottom"></div>

<nav class="top-nav">
  <div class="nav-menu">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-tabs" id="navTabs">
    <div class="nav-tab">成都</div>
    <div class="nav-tab">精选</div>
    <div class="nav-tab">团购</div>
    <div class="nav-tab">直播</div>
    <div class="nav-tab">朋友</div>
    <div class="nav-tab">关注</div>
    <div class="nav-tab active">推荐</div>
  </div>
  <div class="nav-search">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </div>
</nav>

<div class="side-bar">
  <div class="avatar-wrap">
    <div class="avatar-img">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=b6e3f4" alt="avatar">
    </div>
    <div class="avatar-plus">+</div>
  </div>

  <div class="side-btn" id="likeBtn" onclick="toggleLike()">
    <div class="icon-wrap">
      <svg id="heartIcon" width="36" height="36" viewBox="0 0 24 24" fill="rgba(255,255,255,0.95)">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </div>
    <span class="label" id="likeLabel">3090</span>
  </div>

  <div class="side-btn">
    <div class="icon-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="rgba(255,255,255,0.95)">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 9h-2V9h2v2zm-4 0h-2V9h2v2zm-4 0H7V9h2v2z"/>
      </svg>
    </div>
    <span class="label">893</span>
  </div>

  <div class="side-btn" id="starBtn" onclick="toggleStar()">
    <div class="icon-wrap">
      <svg id="starIcon" width="34" height="34" viewBox="0 0 24 24" fill="rgba(255,255,255,0.95)">
        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
      </svg>
    </div>
    <span class="label" id="starLabel">274</span>
  </div>

  <div class="side-btn">
    <div class="icon-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="rgba(255,255,255,0.95)">
        <path d="M13.5 5.5v-3l8 7-8 7v-3c-6 0-10.5 2-13 6 1.5-6 5-11 13-11z"/>
      </svg>
    </div>
    <span class="label">379</span>
  </div>

  <div class="disc-wrap">
    <div class="disc"></div>
  </div>
</div>

<div class="video-info">
  <div class="vi-username">@禾桉.</div>
  <div class="vi-desc">
    本来就想让我朋友记录一下 结果刚好拍到了全过程 头撞到栏杆上惹 好痛@soet #草地 #...<span class="expand">展开 ∨</span>
  </div>
  <div class="vi-music">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff">
      <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
    </svg>
    <span class="vi-music-text">原声 - 禾桉.</span>
  </div>
</div>

<div class="progress-bar-container">
  <div class="progress-bg">
    <div class="progress-fill">
      <div class="progress-handle"></div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active"><span class="tab-label">首页</span></div>
  <div class="tab-item"><span class="tab-label">商城</span></div>
  <div class="tab-publish">
    <div class="pub-btn"><div class="pub-inner">+</div></div>
  </div>
  <div class="tab-item"><span class="tab-label">消息</span></div>
  <div class="tab-item"><span class="tab-label">我</span></div>
</div>

<script>
  const video = document.getElementById('mainVideo');

  const tryPlay = () => video.play().catch(() => {});
  video.addEventListener('canplay', tryPlay);
  document.addEventListener('touchstart', tryPlay, { once: true });
  document.addEventListener('click', tryPlay, { once: true });

  document.getElementById('videoLayer').addEventListener('click', function(e) {
    if (e.target.closest('.side-bar') || e.target.closest('.top-nav') || e.target.closest('.tab-bar') || e.target.closest('.video-info')) return;
    video.paused ? video.play() : video.pause();
  });

  let lastTap = 0;
  document.getElementById('videoLayer').addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTap < 300) {
      spawnHeart(e.changedTouches[0].pageX, e.changedTouches[0].pageY);
      if (!liked) toggleLike();
    }
    lastTap = now;
  });

  // 点赞逻辑匹配截图数据
  let liked = false;
  let likeNum = 3090;

  function toggleLike() {
    liked = !liked;
    const icon = document.getElementById('heartIcon');
    const label = document.getElementById('likeLabel');
    if (liked) {
      likeNum++;
      icon.setAttribute('fill', '#fe2c55');
      icon.style.transform = 'scale(1.2)';
      setTimeout(() => icon.style.transform = 'scale(1)', 200);
    } else {
      likeNum--;
      icon.setAttribute('fill', 'rgba(255,255,255,0.95)');
    }
    label.textContent = likeNum;
    label.classList.remove('count-bump');
    void label.offsetWidth;
    label.classList.add('count-bump');
  }

  // 收藏逻辑
  let starred = false;
  let starNum = 274;

  function toggleStar() {
    starred = !starred;
    const icon = document.getElementById('starIcon');
    const label = document.getElementById('starLabel');
    if (starred) {
      starNum++;
      icon.setAttribute('fill', '#ffd700');
    } else {
      starNum--;
      icon.setAttribute('fill', 'rgba(255,255,255,0.95)');
    }
    label.textContent = starNum;
  }

  function spawnHeart(x, y) {
    const el = document.createElement('div');
    el.className = 'tap-heart';
    el.style.cssText = `left:${x}px;top:${y}px`;
    el.innerHTML = `<svg viewBox="0 0 24 24" fill="#fe2c55" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
</script>

</body>
</html>
