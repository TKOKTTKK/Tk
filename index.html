<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>视频贴顶版</title>
<style>
  /* 基础重置，确保没有默认边距 */
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100%;
    height: 100%;
    background-color: #000;
    overflow: hidden;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* 滚动容器 */
  .scroll-container {
    height: 100dvh;
    width: 100vw;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-container::-webkit-scrollbar { display: none; }

  /* 视频槽位 */
  .video-section {
    width: 100vw;
    height: 100dvh;
    scroll-snap-align: start;
    position: relative;
    background: #000; /* 底部留黑的背景色 */
    overflow: hidden;
  }

  /* 核心修改：贴顶对齐 */
  .main-video {
    width: 100%;
    height: 100%;
    
    /* contain: 保证视频完整显示，不被裁剪 */
    object-fit: contain; 
    
    /* top: 让视频在容器的最顶部对齐 */
    object-position: top; 
    
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>

<div class="scroll-container">
  
  <div class="video-section">
    <video class="main-video" loop playsinline src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeie53svjmqhznjlosvlkvtu7cckzrgwexo3h2ljvartpuhzsr3kdki"></video>
  </div>

  <div class="video-section">
    <video class="main-video" loop playsinline src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeifskd2zsnlquiyp4bdv2q2b2rzukscpr6lurer75buhy6qgb545ea"></video>
  </div>

  <div class="video-section"><video class="main-video" loop playsinline src="链接03"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接04"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接05"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接06"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接07"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接08"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接09"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接10"></video></div>

</div>

<script>
  // 自动播放逻辑
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target;
      if (entry.isIntersecting) {
        video.play().catch(() => {});
      } else {
        video.pause();
        video.currentTime = 0;
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('.main-video').forEach(vid => observer.observe(vid));

  // 移动端权限激活
  document.addEventListener('touchstart', () => {
    const vids = document.querySelectorAll('.main-video');
    vids.forEach(v => {
      const rect = v.getBoundingClientRect();
      if (rect.top >= 0 && rect.top < window.innerHeight) {
        v.play().catch(()=>{});
      }
    });
  }, { once: true });
</script>

</body>
</html>
