<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
  /* 1. 暴力清除所有可能导致“白边”或“偏移”的边距 */
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100vw;
    height: 100dvh;
    background-color: #000;
    overflow: hidden;
    position: fixed; /* 防止橡皮筋回弹导致画面歪掉 */
  }

  * { box-sizing: border-box; }

  /* 2. 容器确保从 0,0 坐标开始 */
  .scroll-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100dvh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-container::-webkit-scrollbar { display: none; }

  /* 3. 每一个视频层 */
  .video-section {
    width: 100vw;
    height: 100dvh;
    scroll-snap-align: start;
    position: relative;
    background: #000; /* 底部自动变黑 */
    overflow: hidden;
  }

  /* 4. 视频标签：强制贴顶、左右撑满 */
  .main-video {
    position: absolute;
    top: 0;      /* 暴力贴顶 */
    left: 0;     /* 暴力贴左 */
    width: 100%; /* 强制宽度铺满屏幕 */
    height: auto; /* 高度自适应，确保不留左右黑边 */
    min-height: 50%; /* 保证至少显示一半 */
    
    /* 核心属性：contain 配合 top 坐标 */
    object-fit: contain; 
    object-position: top; 
    
    display: block;
  }
</style>
</head>
<body>

<div class="scroll-container">
  
  <div class="video-section">
    <video class="main-video" loop playsinline src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeie53svjmqhznjlosvlkvtu7cckzrgwexo3h2ljvartpuhzsr3kdki"></video>
  </div>

  <div class="video-section">
    <video class="main-video" loop playsinline src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeifskd2zsnlquiyp4bdv2q2b2rzukscpr6lurer75buhy6qgb545ea"></video>
  </div>

  <div class="video-section"><video class="main-video" loop playsinline src="链接03"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接04"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接05"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接06"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接07"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接08"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接09"></video></div>
  <div class="video-section"><video class="main-video" loop playsinline src="链接10"></video></div>

</div>

<script>
  // 智能播放与停止
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.play().catch(() => {});
      } else {
        entry.target.pause();
        entry.target.currentTime = 0;
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('.main-video').forEach(vid => observer.observe(vid));

  // 解决移动端首次点击播放权限
  document.addEventListener('touchstart', () => {
    const vids = document.querySelectorAll('.main-video');
    vids.forEach(v => {
      const rect = v.getBoundingClientRect();
      if (rect.top >= 0 && rect.top < window.innerHeight) {
        v.play().catch(()=>{});
      }
    });
  }, { once: true });
</script>

</body>
</html>
