<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>抖音 APP 版 UI 优化</title>
    <style>
        :root {
            --dy-red: #fe2c55;
            --dy-cyan: #25f4ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: #fff;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ── 视频层 ── */
        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ── 阴影遮罩 (保证文字清晰) ── */
        .overlay-top {
            position: absolute; top: 0; width: 100%; height: 160px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
            z-index: 2; pointer-events: none;
        }

        .overlay-bottom {
            position: absolute; bottom: 0; width: 100%; height: 260px;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
            z-index: 2; pointer-events: none;
        }

        /* ── 顶部导航 ── */
        .top-nav {
            position: fixed; top: env(safe-area-inset-top, 20px);
            left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px;
        }

        .top-left, .top-right { width: 40px; display: flex; align-items: center; }
        .top-right { justify-content: flex-end; }

        .nav-tabs {
            display: flex; gap: 15px; font-size: 16px; color: rgba(255,255,255,0.6);
            font-weight: 600; overflow-x: auto; white-space: nowrap;
            scrollbar-width: none;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }
        
        .nav-tab.active { color: #fff; position: relative; }
        .nav-tab.active::after {
            content: ''; position: absolute; bottom: -5px; left: 20%; width: 60%;
            height: 2px; background: #fff;
        }

        /* ── 右侧操作栏 ── */
        .side-bar {
            position: absolute; right: 8px; bottom: 110px;
            z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 18px;
        }

        .side-icon-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .side-icon-group span { font-size: 12px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        .avatar-box {
            position: relative; width: 50px; height: 50px; margin-bottom: 10px;
        }
        .avatar-box img { 
            width: 100%; height: 100%; border-radius: 50%; border: 1px solid #fff; 
        }
        .avatar-box .plus {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px; background: var(--dy-red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        /* ── 底部信息 ── */
        .bottom-info {
            position: absolute; left: 12px; bottom: 100px; right: 80px; z-index: 100;
        }
        .user-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .video-desc { font-size: 15px; line-height: 1.4; margin-bottom: 12px; }
        .music-box { display: flex; align-items: center; gap: 8px; font-size: 14px; width: 80%; overflow: hidden; }
        
        @keyframes scrollMusic {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .music-name { white-space: nowrap; animation: scrollMusic 10s linear infinite; }

        /* ── 底部导航栏 ── */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%;
            height: calc(55px + env(safe-area-inset-bottom));
            background: #000; z-index: 100;
            display: flex; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }

        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #888; }
        .tab-item.active { color: #fff; }
        .tab-item span { font-size: 10px; margin-top: 4px; font-weight: 600; }
        
        /* 灵魂组件：发布按钮 */
        .publish-btn {
            width: 45px; height: 28px; background: #fff; border-radius: 8px;
            position: relative; display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 20px; font-weight: bold;
        }
        .publish-btn::before {
            content: ''; position: absolute; left: -3px; width: 100%; height: 100%;
            background: var(--dy-cyan); border-radius: 8px; z-index: -1;
        }
        .publish-btn::after {
            content: ''; position: absolute; right: -3px; width: 100%; height: 100%;
            background: var(--dy-red); border-radius: 8px; z-index: -2;
        }

        /* 唱片旋转动画 */
        .record-disc {
            width: 45px; height: 45px; border-radius: 50%;
            background: radial-gradient(circle, #333 20%, #111 100%);
            border: 8px solid #222;
            animation: rotate 5s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 点赞动画心形 */
        .tap-heart {
            position: absolute; width: 80px; height: 80px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fe2c55"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') no-repeat;
            z-index: 999; pointer-events: none; transform: translate(-50%, -50%) scale(0);
            animation: heartAnim 0.8s ease-out forwards;
        }
        @keyframes heartAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>

    <div class="top-nav">
        <div class="top-left">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
        <div class="nav-tabs">
            <div class="nav-tab">成都</div>
            <div class="nav-tab">精选</div>
            <div class="nav-tab">关注</div>
            <div class="nav-tab active">推荐</div>
        </div>
        <div class="top-right">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
    </div>

    <div class="video-container" id="videoLayer">
        <div class="video-item">
            <video id="mainVideo" loop playsinline src="https://turquoise-absolute-cheetah-543.mypinata.cloud/ipfs/bafybeie53svjmqhznjlosvlkvtu7cckzrgwexo3h2ljvartpuhzsr3kdki"></video>
        </div>
    </div>

    <div class="side-bar">
        <div class="avatar-box">
            <img src="https://dummyimage.com/100/fe2c55/fff&text=Me" alt="头像">
            <div class="plus">+</div>
        </div>
        <div class="side-icon-group">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span>37.1万</span>
        </div>
        <div class="side-icon-group">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>4982</span>
        </div>
        <div class="side-icon-group">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            <span>1.7万</span>
        </div>
        <div class="side-icon-group">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M15 10l5 5-5 5v-4H4v-2h11v-4z"/></svg>
            <span>3.2万</span>
        </div>
        <div class="record-disc"></div>
    </div>

    <div class="bottom-info">
        <div class="user-name">@我的Pinata视频</div>
        <div class="video-desc">这是存在IPFS上的视频 🎉 #去中心化存储 #Web3 #IPFS</div>
        <div class="music-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
            <div class="music-name">原声 - IPFS去中心化存储演示 · 原声 - IPFS去中心化存储演示</div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active">
            <span>首页</span>
        </div>
        <div class="tab-item">
            <span>商城</span>
        </div>
        <div class="tab-item">
            <div class="publish-btn">+</div>
        </div>
        <div class="tab-item">
            <span>消息</span>
        </div>
        <div class="tab-item">
            <span>我</span>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const videoLayer = document.getElementById('videoLayer');

    // 自动播放逻辑
    document.addEventListener('click', () => {
        video.play();
    }, { once: true });

    // 双击点赞功能
    let lastTap = 0;
    videoLayer.addEventListener('touchend', function(e) {
        const curTime = new Date().getTime();
        const tapLen = curTime - lastTap;
        if (tapLen < 300 && tapLen > 0) {
            createHeart(e.changedTouches[0].pageX, e.changedTouches[0].pageY);
        }
        lastTap = curTime;
    });

    function createHeart(x, y) {
        const heart = document.createElement('div');
        heart.className = 'tap-heart';
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 800);
    }
</script>

</body>
</html>
